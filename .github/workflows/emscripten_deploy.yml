name: "compile with emscripten"
on: [push]

jobs:
  build:
  
    runs-on: ubuntu-latest
    steps:
      - uses: emscripten-core/setup-emsdk@v15

      - name: Verify
        run: emcc -v
        
      - uses: actions/checkout@v7
        with:
          repository: DuckDood/fpeeee
      - run: |
          ls
          emmake make -f Makefile_emscripten
          ls
          ls build
          
      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build
  commit:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: build-files
      - run: |
          ls
          ls build-files
